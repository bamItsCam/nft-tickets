services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: tickets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgres://tickets:localdev@db:5432/tickets?sslmode=disable
      ETH_NODE_URL: http://host.docker.internal:31545
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

volumes:
  pgdata:
